# SNIPER PRO 2024 - Master Configuration
# Complete configuration for the 4-bot orchestration system

# System Mode
# DISABLED: All automated trading disabled for safety
# Set to LIVE_TRADING only when ready for real trading
system:
  mode: "DISABLED"  # DISABLED, PAPER_TRADING, LIVE_TRADING
  bot_architecture: "NONE"  # DISABLED - no bots running
  broker_timezone: "Africa/Nairobi"  # Nairobi timezone (GMT+3)
  
# Account Settings
account:
  # NOTE: This balance is a REFERENCE ONLY for initialization and fallback.
  # The bot ALWAYS uses live MT5 equity via mt5.account_info().equity for all trading decisions.
  # Update this value to match your current MT5 account for accurate circuit breaker initialization.
  # The system automatically adapts to profits/losses/deposits/withdrawals in real-time.
  balance: 108.17  # Current MT5 account balance (update when switching accounts)
  currency: "USD"
  leverage: 100
  
# Symbols to Trade
# NOTE: EURUSD disabled - strategy not profitable for forex (see optimized backtest results)
symbols:
  primary:
    - XAUUSD  # PROFITABLE: +191% in 90 days, 54% win rate
  # - EURUSD  # DISABLED: -166% in 90 days, 23% win rate
  # - GBPUSD  # DISABLED: strategy needs optimization for forex
  secondary:
    - XAGUSD  # Silver
    - USDJPY
    - USDCHF
    - AUDUSD
    - USDCAD
    - "Volatility 75 Index"
    - "Crash 500 Index"
    - "Boom 500 Index"
  watch_only:
    - NZDUSD
    - EURGBP
    - GBPJPY

# Synthetic Indices (Deriv/CFD brokers that expose Crash/Boom/Volatility symbols)
# Notes:
# - Use exact symbol names from your MT5 Market Watch.
# - These markets are generally synthetic and not driven by macro news.
synthetic_indices:
  enabled: true
  symbols:
    - "Volatility 10 Index"
    - "Volatility 25 Index"
    - "Volatility 50 Index"
    - "Volatility 75 Index"
    - "Volatility 100 Index"
    - "Crash 300 Index"
    - "Crash 500 Index"
    - "Crash 1000 Index"
    - "Boom 300 Index"
    - "Boom 500 Index"
    - "Boom 1000 Index"

# Dedicated Synthetic Strategy Pack
synthetic_strategies:
  enabled: true
  min_confidence: 64
  atr_period: 14
  breakout_lookback: 20
  spike_atr_multiplier: 2.2
  wick_ratio_threshold: 0.52
  breakout_atr_multiplier: 1.15
  rsi_period: 14
  rsi_oversold: 28
  rsi_overbought: 72
    
# Timeframe Configuration
timeframes:
  signal: "M15"       # Primary signal timeframe
  confirmation: "H1"  # Confirmation timeframe
  trend: "H4"         # Trend context
  structure: "D"      # Market structure
  
# ICT 2022 Configuration (GMT+3)
ict:
  enabled: true
  killzones:
    london:
      start: 11  # 11 AM GMT+3 = 8 AM GMT
      end: 13    # 1 PM GMT+3 = 10 AM GMT
      priority: 1
    new_york:
      start: 14  # 2 PM GMT+3 = 11 AM GMT
      end: 23    # 11 PM GMT+3 = 8 PM GMT
      priority: 2
    silver_bullet:
      start: 18  # 6 PM GMT+3 = 3 PM GMT
      end: 19    # 7 PM GMT+3 = 4 PM GMT
      priority: 3  # Highest priority
  
  amd_cycle:
    enabled: true
    require_phase: false  # Can trade without clear AMD phase
    
  liquidity_sweeps:
    enabled: true
    min_sweep_pips: 1.0
    require_confirmation: true
    
  fair_value_gaps:
    enabled: true
    min_gap_pips: 3.0
    ote_entry: true  # Use 62-78.6% OTE levels
    
  order_blocks:
    enabled: true
    min_strength: 50  # 0-100 scale
    
# Strategy Selection
strategy_selection:
  method: "regime_based"  # regime_based, ml_based, hybrid
  max_strategies_active: 5
  min_strategy_agreement: 2  # Minimum strategies that must agree
  require_multi_tf_confirmation: true
  
  # Strategy groups configuration
  use_conflict_manager: true
  max_groups: 3
  max_strategies_per_group: 4
  min_confidence: 60  # Minimum confidence to activate strategy
  
  # Pattern Evidence Module
  pattern_evidence:
    enabled: true
    min_confidence: 20.0  # Reduced from 35.0 (XAUUSD was stuck at 22%)
  
  # ML configuration
  use_ml_selector: true
  ml_confidence_threshold: 65
  ml_model_path: "models/"
  
# Risk Management - CONSERVATIVE SETTINGS
risk:
  # Position Sizing
  method: "fixed"  # DISABLED auto-sizing, using manual controls only
  base_risk_per_trade: 0.01  # 1% max risk (ultra conservative)
  max_risk_per_trade: 0.01   # 1% maximum
  min_risk_per_trade: 0.005   # 0.5% minimum
  min_risk_floor_usd: 1.00    # Minimum $1 risk floor
  
  # Kelly Criterion - UNIFIED TO 1/8 KELLY (CONSERVATIVE)
  use_conservative_kelly: true
  kelly_fraction: 0.125  # 1/8 Kelly (12.5%) - CONSERVATIVE for small accounts
  
  # Adjustments
  volatility_adjustment: true
  correlation_adjustment: true
  account_size_adjustment: true
  instrument_adjustment: true
  strategy_confidence_adjustment: true
  
  # Portfolio Limits - CORRECTED FOR SMALL ACCOUNT ($108)
  max_daily_loss_percent: 0.02  # 2% (allows 4 max-risk losses - conservative for survival)
  max_trades_per_day: 4  # Reduced for small account
  max_concurrent_trades: 2  # FIXED: Was 8 - reduced to 2 for $108 account safety
  max_positions_per_symbol: 1  # FIXED: Was 3 - no pyramiding for small accounts
  max_positions_per_strategy: 1  # Single position per strategy
  consecutive_losses_before_reduction: 2  # Reduce size after 2 losses
  
  # Correlation
  max_correlation_between_positions: 0.7
  use_correlation_portfolio_manager: true
  
  # Sector Concentration
  max_sector_concentration: 0.8  # 80% max in one sector (allows more diversified entries)
  sectors:
    FOREX_MAJOR: ["EURUSD", "GBPUSD", "USDJPY", "USDCHF"]
    FOREX_MINOR: ["AUDUSD", "NZDUSD", "USDCAD", "EURGBP"]
    METALS: ["XAUUSD", "XAGUSD"]
    SYNTHETIC_INDICES: [
      "Volatility 10 Index", "Volatility 25 Index", "Volatility 50 Index", "Volatility 75 Index", "Volatility 100 Index",
      "Crash 300 Index", "Crash 500 Index", "Crash 1000 Index",
      "Boom 300 Index", "Boom 500 Index", "Boom 1000 Index"
    ]
    
  # Circuit Breaker - EMERGENCY STOP
  circuit_breaker:
    enabled: true
    max_consecutive_losses: 2  # Stop after 2 losses
    max_daily_loss_pct: 0.02   # 2% daily loss
    min_daily_loss_amount_usd: 2.0  # Absolute floor
    max_drawdown_pct: 0.10     # 10% drawdown
    min_drawdown_amount_usd: 5.0   # Absolute floor
    rapid_loss_threshold: 3     # 3 losses in 1 hour
    
  # EMERGENCY STOP - Prevents automated trading
  emergency_stop: true  # Set to false only when manually trading
  
  # Pause durations (hours) - ADJUSTED
  pause_durations:
    consecutive_losses: 2      # 2 hour pause (reduced size, not full stop)
    daily_loss_limit: 24
    drawdown_limit: 48         # 48 hours for drawdown
    high_volatility: 1         # 1 hour for volatility spike
    major_news: 0.5
    wide_spread: 0.25
  
  # Action on consecutive losses (don't stop, reduce size)
  consecutive_loss_action: "reduce_size_50%"  # Reduce to 50%, not pause
    
  # Volatility thresholds
  extreme_volatility_threshold: 3.0  # ATR multiplier
  
  # CRITICAL: Normal spread values in PIPS (not points)
  # Circuit breaker triggers when spread > normal_spread * spread_multiplier_threshold
  normal_spread:
    # Forex Major Pairs (typical spreads)
    EURUSD: 2.0
    GBPUSD: 3.0
    USDJPY: 2.0
    USDCHF: 3.0
    USDCAD: 3.0
    AUDUSD: 2.5
    NZDUSD: 3.0
    
    # Forex Cross Pairs (wider spreads)
    EURGBP: 3.0
    EURJPY: 3.5
    GBPJPY: 4.0
    EURAUD: 4.0
    EURNZD: 5.0
    
    # Metals (MUCH wider spreads - was 0.50, should be 50.0!)
    XAUUSD: 50.0   # Gold: 20-50 pips normal
    XAGUSD: 30.0   # Silver: 15-40 pips normal
    
  # Trigger when spread > normal * multiplier
  # FIXED: XAUUSD was 50*3=150 pips - too aggressive, changed to 6x for 300 pip threshold
  spread_multiplier_threshold: 6.0  # XAUUSD: 50*6 = 300 pips before circuit breaker
  
# Exit Management
exits:
  use_trailing_stops: true
  use_partial_exits: true
  max_hold_hours: 24
  enable_defensive_stop_adjustment: true
  max_stop_adjustments: 1
  adjustment_trigger_atr_fraction: 0.35
  max_extension_r_multiple: 0.35
  max_extension_atr: 0.60
  min_recovery_score: 0.55
  min_hold_seconds: 300  # 5 min minimum before technical/trailing exits can fire
  
  # Profit targets
  tp1_rr: 1.5   # First target at 1:1.5
  tp2_rr: 2.5   # Second target at 1:2.5
  tp3_rr: 4.0   # Third target at 1:4
  
  # Partial exit percentages
  tp1_exit_percent: 50  # Take 50% at TP1
  tp2_exit_percent: 30  # Take 30% at TP2
  tp3_exit_percent: 20  # Take remaining 20% at TP3
  
  # Trailing stop
  trailing_stop_activation: "after_tp1"
  trailing_stop_distance_atr: 2.0
  
  # Breakeven
  move_to_breakeven: true
  breakeven_trigger_pips: 15
  
  # Technical exits
  use_rsi_exits: true
  rsi_overbought: 75
  rsi_oversold: 25
  
  use_macd_divergence_exits: true
  
  # Time exits
  use_time_exits: true
  
  # Correlation exits
  use_correlation_exits: true
  
# Execution Settings
execution:
  # Order types
  use_limit_orders: false
  use_market_orders: true
  max_top_bot_orders_per_cycle: 4  # Global cap for additional top-bot module orders
  pending_min_distance_points: 5  # Min distance (in points) between desired entry and market before placing pending order
  pending_order_timeout_minutes: 20  # Cancel/ignore stale pending orders faster to avoid long duplicate-order lockouts
  
  # Slippage
  max_slippage_pips: 2
  
  # Spread filtering
  max_spread_pips:
    EURUSD: 2.0
    GBPUSD: 3.0
    USDJPY: 2.5
    USDCHF: 2.5
    AUDUSD: 2.5
    USDCAD: 3.0
    NZDUSD: 3.0
    XAUUSD: 80.0
    XAGUSD: 120.0
    default: 4.0
    
  # Entry quality
  entry_quality: "SNIPER"  # SNIPER, BALANCED, AGGRESSIVE
  min_confluence_factors: 3  # For SNIPER mode
  min_risk_reward: 1.2       # Reduced from 1.5 (was blocking too many trades for small account)
  min_confidence: 65         # Balanced floor for live synthetic flow (prevents over-rejection at 66-70% setups)
  atr_window: 14             # ATR period for volatility-aware quality checks
  min_stop_distance_atr: 0.35  # Avoid stops too tight for prevailing volatility
  max_spread_to_atr: 0.20      # Increased from 0.12 (allow Asian session / low liquidity)
  
  # Session filtering
  avoid_asian_session: true
  prefer_killzones: true
  
  # News filtering
  avoid_news_events: true
  news_pause_minutes_before: 30
  news_pause_minutes_after: 15

  # Per-symbol lockout after repeated execution failures
  failure_lockout:
    enabled: true
    max_failures: 3
    cooldown_minutes: 20

  # Adaptive cooldown manager (escalates cooldown after repeated failures)
  cooldown_manager:
    max_failures_per_symbol: 3
    base_cooldown_minutes: 20
    reset_failures_after_minutes: 240

  # Symbol reliability gate (telemetry-driven)
  reliability_gate:
    enabled: true
    min_attempts: 10
    min_fill_rate_percent: 35.0

# Runtime VaR/CVaR guardrails
var_engine:
  enabled: true
  confidence_level: 0.95
  historical_window: 100
  max_var_pct: 0.02
  max_cvar_pct: 0.03
  risk_actions:
    level1_threshold: 0.60
    level2_threshold: 0.80
    level3_threshold: 1.00

# Multi-Timeframe Confirmation Gate
# Prevents trading against higher timeframe trends (H1/H4/D1)
multi_timeframe:
  enabled: true
  min_agreement_pct: 60.0   # Minimum % of timeframes that must agree to block counter-trend trades
  timeframes:
    - M15
    - H1
    - H4
    - D1
  weights:
    M15: 0.15
    H1: 0.25
    H4: 0.35
    D1: 0.25

# Smart Trade Filter (Research-based: Forex Fury, Waka Waka, GPS Robot features)
# Prevents overtrading, implements adaptive risk, and enforces session discipline
smart_trade_filter:
  enabled: true
  # Trade frequency limits (cumulative opens, not concurrent; portfolio manager handles position cap)
  max_trades_per_day: 20
  max_trades_per_session: 12
  max_trades_per_symbol_per_day: 5
  # Post-loss cooldown (anti-revenge trading)
  post_loss_cooldown_minutes: 15
  consecutive_loss_cooldown_minutes: 45
  max_consecutive_losses_before_pause: 3
  # Adaptive risk scaling (Waka Waka stability)
  enable_adaptive_scaling: true
  min_risk_multiplier: 0.25     # Minimum 25% of normal size after losses
  max_risk_multiplier: 1.2      # Maximum 120% of normal size after wins
  loss_scale_factor: 0.7        # Reduce to 70% after each loss
  win_recovery_factor: 1.15     # Recover 15% after each win
  # Volatility regime filter (Forex Fury: low-vol windows)
  enable_volatility_filter: true
  optimal_volatility_min: 0.3   # Block if vol ratio < 0.3 (dead market)
  optimal_volatility_max: 2.5   # Block if vol ratio > 2.5 (too volatile)
  # Equity curve filter
  enable_equity_curve_filter: true
  equity_sma_period: 10

# Hierarchical adaptive strategy agents
ai_agents:
  enabled: true
  regime_agent:
    lookback: 100
    volatility_thresholds:
      low: 0.5
      high: 2.0
  trend_agent:
    initial_weight: 0.33
    fast_period: 20
    slow_period: 50
  mean_reversion_agent:
    initial_weight: 0.33
    lookback: 20
  volatility_breakout_agent:
    initial_weight: 0.34
    lookback: 30
    spike_detection_threshold: 2.5

# Optional async MT5 command queue
async_engine:
  enabled: true

# Volatility-targeted lot sizing override
volatility_sizing:
  enabled: true
  risk_per_trade_pct: 0.005
  atr_period: 14
  min_stop_atr: 2.0
  min_size: 0.01
  max_size: 0.10  # Capped for small account safety (code also enforces emergency cap)
  
