    fixed_ratio_delta: 5000  # Profit increment for scaling
    target_volatility: 2.0  # Target portfolio volatility %
    
  # Seasonality Analysis (ENHANCED with WMR fixing)
  seasonality:
    enabled: true
    timezone_offset: 3  # GMT+3 for Nairobi
    use_monthly_patterns: true
    use_weekly_patterns: true
    use_intraday_patterns: true
    london_4pm_fix_aware: true  # WMR fixing window
    
  # Wyckoff Method
  wyckoff:
    enabled: true
    lookback_period: 100
    min_confidence: 70
    
  # Elliott Wave Analysis (NEW)
  elliott_wave:
    enabled: true
    lookback_period: 200
    min_confidence: 60
    use_fibonacci_targets: true
    
  # Portfolio Heat
  portfolio_heat:
    enabled: true
    max_heat_percent: 6.0  # Maximum portfolio heat
    warning_threshold: 0.8  # Warn at 80% of max
    
  # Carry Trade (ENHANCED with swap tracking)
  carry_trade:
    enabled: true
    min_rate_differential: 1.5  # Minimum rate diff for signal
    track_swap_rates: true  # Real-time swap tracking
    wednesday_triple_swap_aware: true
