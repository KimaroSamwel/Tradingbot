# 4-Bot Orchestra Configuration
bots:
  sniper_scout:
    enabled: true
    scan_interval_minutes: 5
    max_watchlist_items: 20
    min_pattern_confidence: 60
    
  precision_confirmer:
    enabled: true
    min_timeframe_agreement: 67  # 2 out of 3 timeframes
    min_validation_score: 70
    
  execution_sniper:
    enabled: true
    max_orders_per_cycle: 2
    
  guardian:
    enabled: true
    monitor_interval_seconds: 30
    
# Performance Monitoring
monitoring:
  enable_performance_attribution: true
  enable_real_time_tracking: true
  min_trades_for_insights: 10
  
  # Reporting
  daily_report: true
  weekly_report: true
  monthly_report: true
  
  # Alerts
  enable_telegram_alerts: false
  enable_email_alerts: false
  
  telegram:
    bot_token: ""
    chat_id: ""
    
  email:
    smtp_server: ""
    smtp_port: 587
    sender_email: ""
    receiver_email: ""
    password: ""

# Execution lifecycle telemetry for reliability scoring
execution_telemetry:
  enabled: true
  history_file: "logs/execution_telemetry.json"
  max_events: 10000
  flush_on_event: false

# Pattern evidence confidence layer
# - 6 bearish pullback templates
# - 4 bullish confirmation templates
# - regime gating + A/B control tracking
pattern_evidence:
  enabled: true
  lookback_bars: 140
  min_confidence: 20.0  # Reduced from 35.0 (XAUUSD was stuck at 22%, just below threshold)
  min_regime_confidence: 20.0
  counter_signal_penalty: 0.30
  base_confidence_blend: 0.35
  fail_on_insufficient_data: false
  regime_gate:
    require_alignment: false
    bearish_allowed_regimes: ["STRONG_DOWNTREND", "MODERATE_DOWNTREND", "TRANSITION", "RANGING"]
    bullish_allowed_regimes: ["STRONG_UPTREND", "MODERATE_UPTREND", "TRANSITION", "RANGING"]
  ab_testing:
    enabled: true
    control_ratio: 0.25
    seed: "sniper-pattern-evidence-v1"

# Full order lifecycle tracker (signal -> pending -> fill -> close)
order_lifecycle_tracker:
  enabled: true
  history_file: "logs/order_lifecycle.json"
  csv_file: "logs/order_lifecycle.csv"
  max_records: 20000
  flush_on_event: false

# Forward Performance Validator (blocks live mode if edge quality degrades)
forward_validator:
  enabled: true
  block_live_mode: false
  history_file: "logs/forward_trades_history.json"
  max_history_records: 5000

  # Sample requirement
  min_trades: 30
  lookback_trades: 200
  require_closed_trades: true

  # Quality thresholds
  min_profit_factor: 1.20
  min_expectancy: 0.0
  min_expectancy_pct: 0.0
  max_drawdown_pct: 0.12

  # Walk-forward matrix by asset class (deployment gate)
  walk_forward_matrix:
    enabled: true
    block_live_mode: false
    required_classes: ["FOREX", "METALS", "SYNTHETICS"]
    min_trades_per_class: 20
    window_size: 30
    step_size: 10
    min_profit_factor: 1.10
    min_win_rate: 48.0
    max_drawdown_pct: 0.15
    min_pass_ratio: 0.60
    block_on_insufficient_trades: false

# External YAML walk-forward test matrix gate (tests/walk_forward/configs/*.yaml)
