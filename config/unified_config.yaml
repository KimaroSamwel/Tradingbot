# UNIFIED TRADING BOT CONFIGURATION
# Complete integration: ICT + AMD + Traditional Strategies

# PRIMARY STRATEGY SELECTION
primary_strategy: "ict_2022"  # Options: ict_2022, power_of_3, trend_following, mean_reversion, auto
enable_fallback: true  # Enable fallback strategies when ICT conditions not met
enable_amd: true  # Enable Accumulation-Manipulation-Distribution detection

# SYMBOL CONFIGURATION
symbols:
  primary: "XAUUSD"  # Gold - best for ICT
  secondary:
    - "EURUSD"
    - "GBPUSD"
  
# ICT STRATEGY SETTINGS
ict:
  enabled: true
  
  # Confluence Requirements
  min_confluence_score: 70  # Minimum 70/100 to trade
  min_risk_reward: 2.0  # Minimum 1:2 R:R
  
  # Session Settings (GMT+3 timezone for Nairobi)
  timezone: "Africa/Nairobi"
  allowed_sessions:
    - london       # 3:00-5:00 AM EST (Priority 1)
    - ny_am        # 8:00 AM-12:00 PM EST (Priority 1)
    - silver_bullet  # 10:00-11:00 AM EST (Highest probability)
  
  # AMD Cycle Detection
  amd:
    enabled: true
    track_asian_range: true  # Mark accumulation during Asian session
    require_manipulation: true  # Require manipulation confirmation
    min_distribution_break: 10  # Minimum pips beyond range for distribution
  
  # Liquidity Detector
  liquidity:
    lookback_bars: 20
    equal_tolerance_pips: 2.0
    min_sweep_pips: 1.0
    min_rejection_ratio: 2.0
  
  # Market Structure
  structure:
    swing_lookback: 10
    min_break_pips: 5.0
  
  # Fair Value Gap
  fvg:
    min_gap_pips: 5.0
    min_body_ratio: 0.5
    use_ote: true  # Use Optimal Trade Entry (62-78.6%)

# TRADITIONAL STRATEGIES (Fallback)
trend_following:
  enabled: true
  ema_fast: 9
  ema_medium: 21
  ema_slow: 50
  min_adx: 25  # Minimum ADX for trend confirmation
  
mean_reversion:
  enabled: true
  bb_period: 20
  bb_std: 2
  rsi_period: 14
  rsi_oversold: 30
  rsi_overbought: 70
  max_adx: 25  # Only trade when ADX is low (ranging)

# RISK MANAGEMENT
risk:
  # Position Sizing
  position_size_method: "adaptive"  # Options: fixed, adaptive, kelly
  risk_per_trade_percent: 1.0  # 1% risk per trade
  max_position_size_percent: 2.0  # Max 2% of account per position
  
  # Daily Limits
  max_daily_loss_percent: 2.0  # Stop trading after 2% daily loss
  max_trades_per_day: 3
  max_consecutive_losses: 3
  
  # Portfolio Risk
  max_portfolio_risk_percent: 5.0  # Max 5% total exposure
  max_correlated_positions: 2
  correlation_threshold: 0.7
  
  # Drawdown Management
  max_drawdown_percent: 10.0  # Pause trading at 10% drawdown
  drawdown_reduction_factor: 0.5  # Reduce size by 50% at 5% drawdown
  
  # Partial Take Profits (ICT Method)
  partial_tp:
    enabled: true
    tp1_percent: 50  # Exit 50% at TP1 (1:2 R:R)
    tp2_percent: 30  # Exit 30% at TP2 (1:3 R:R)
    tp3_percent: 20  # Trail remaining 20%
    trailing_stop_distance: 20  # Pips for trailing stop

# TECHNICAL INDICATORS
indicators:
  # Moving Averages
  ema:
    periods: [9, 21, 50, 200]
    
  # Oscillators
  rsi:
    period: 14
    
  stochastic:
    k_period: 14
    d_period: 3
    slowing: 3
    
  macd:
    fast: 12
    slow: 26
    signal: 9
  
  # Volatility
  atr:
    period: 14
    
  bollinger_bands:
    period: 20
    std: 2

# NEWS FILTER
news_filter:
  enabled: true
  buffer_minutes_before: 30
  buffer_minutes_after: 30
  high_impact_only: true
  api_provider: "tradingeconomics"  # Options: tradingeconomics, forexfactory, alphavantage
  api_key: ""  # Add your API key if using paid service

# PSYCHOLOGY MONITORING
psychology:
  enabled: true
  max_consecutive_losses: 3
  reduce_size_after_losses: true
  reduction_factor: 0.5
  cooldown_period_minutes: 60
  daily_loss_circuit_breaker: true

# EXECUTION SETTINGS
execution:
  slippage_tolerance_pips: 5
  max_spread_pips: 3  # Don't trade if spread exceeds this
  order_fill_timeout_seconds: 30
  retry_attempts: 3
  
  # Order Types
  use_limit_orders: false  # Use market orders for ICT (speed)
  use_stop_orders: false
  
  # Trade Management
  trailing_stop:
    enabled: true
    activation_profit_pct: 1.0  # Start trailing at 1% profit
    trail_distance_pct: 0.5  # Trail 0.5% behind price

# LOGGING & MONITORING
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  log_to_file: true
  log_directory: "data/logs"
  rotate_logs: true
  max_log_size_mb: 100
  backup_count: 10
  
  # What to log
  log_signals: true
  log_trades: true
  log_risk_calculations: true
  log_amd_phases: true
  log_killzone_status: true

# BACKTESTING
backtest:
  enabled: false
  start_date: "2023-01-01"
  end_date: "2024-12-31"
  initial_balance: 10000
  commission_per_lot: 7.0
  slippage_pips: 1.0

# PERFORMANCE TRACKING
performance:
  track_by_strategy: true
  track_by_session: true
  track_by_amd_phase: true
  generate_daily_report: true
  generate_weekly_report: true
  
  # Metrics to Track
  metrics:
    - win_rate
    - profit_factor
    - sharpe_ratio
    - max_drawdown
    - avg_rr_ratio
    - expectancy
    - avg_trade_duration

# NOTIFICATIONS (Optional)
notifications:
  enabled: false
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
  
  email:
    enabled: false
    smtp_server: ""
    smtp_port: 587
    from_email: ""
    to_email: ""
    password: ""
  
  # What to notify
  notify_on_trade_open: true
  notify_on_trade_close: true
  notify_on_daily_loss_limit: true
  notify_on_high_confluence_signal: true

# ADVANCED FEATURES
advanced:
  # Multi-Symbol Correlation
  check_correlations: true
  
  # Machine Learning (Future)
  use_ml_predictions: false
  ml_model_path: ""
  
  # Walk-Forward Optimization
  auto_optimize: false
  optimization_period_days: 90
  
  # Emergency Stop
  emergency_stop_loss_percent: 5.0  # Hard stop at 5% account loss
  auto_shutdown_on_errors: true
  max_consecutive_errors: 5
