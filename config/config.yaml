# APEX FX Trading Bot - Main Configuration
# Matches APEX_FX_Trading_Bot_PRD.pdf

system:
  name: "APEX FX Trading Bot"
  version: "1.0.0"
  mode: "PAPER"  # PAPER, DEMO, LIVE

# Data Sources (per PRD)
data_sources:
  mt5:
    enabled: true
    broker: "Deriv-Demo"
    account: 6023219
  binance:
    enabled: false
  polygon:
    enabled: false

# Trading Pairs
symbols:
  forex:
    - XAUUSD
    - EURUSD
    - GBPUSD
    - USDJPY
    - AUDUSD
    - USDCAD

# Timeframes
timeframes:
  - M5
  - M15
  - M30
  - H1
  - H4
  - D1

default_timeframe: H1

# Trading Sessions (UTC)
sessions:
  SYDNEY: [0, 7]
  TOKYO: [22, 24]
  LONDON: [8, 12]
  OVERLAP: [13, 16]
  NEW_YORK: [16, 22]

allowed_sessions:
  - LONDON
  - NEW_YORK
  - OVERLAP

# Position Limits
trading:
  max_positions: 3
  min_risk_reward_ratio: 2.0