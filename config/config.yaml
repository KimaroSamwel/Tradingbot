# Main Configuration for Professional Forex Trading Bot
# Production-Ready Settings

broker:
  name: "mt5"  # Options: mt5, oanda, ibkr
  environment: "demo"  # Options: demo, live
  auto_reconnect: true
  max_reconnect_attempts: 5
  reconnect_delay: 10

trading:
  # Currency pairs to trade
  pairs:
    - "EURUSD"
    - "GBPUSD"
    - "USDJPY"
    - "AUDUSD"
    - "USDCAD"
    - "NZDUSD"
    - "EURGBP"
  
  # Primary timeframe for analysis
  primary_timeframe: "H1"
  
  # Multi-timeframe analysis
  timeframes:
    - "M5"
    - "M15"
    - "H1"
    - "H4"
    - "D1"
  
  # Position limits
  max_positions: 3
  max_positions_per_pair: 1
  max_correlated_positions: 2
  
  # Trading hours (GMT)
  trading_hours:
    london_session: "07:00-16:00"
    ny_session: "12:00-20:00"
    overlap_only: true  # Only trade London/NY overlap (12:00-16:00)
  
  # Days to trade
  trading_days: [0, 1, 2, 3, 4]  # Monday-Friday (0=Monday, 6=Sunday)
  
  # Spread limits
  max_spread_pips:
    EURUSD: 2.0
    GBPUSD: 2.5
    USDJPY: 2.0
    AUDUSD: 2.0
    USDCAD: 2.5
    NZDUSD: 3.0
    EURGBP: 2.0

risk:
  # Position sizing
  risk_per_trade_pct: 1.0  # 1% risk per trade
  max_risk_per_trade_pct: 2.0
  min_risk_per_trade_pct: 0.5
  
  # Portfolio risk
  max_portfolio_risk_pct: 5.0  # Max 5% of account at risk
  
  # Loss limits
  max_daily_loss_pct: 5.0
  max_weekly_loss_pct: 10.0
  max_monthly_loss_pct: 20.0
  
  # Drawdown limits
  max_drawdown_pct: 20.0
  max_consecutive_losses: 5
  
  # Stop loss / Take profit
  stop_loss_atr_multiplier: 1.5
  take_profit_atr_multiplier: 2.5
  trailing_stop_atr_multiplier: 0.5
  trailing_stop_activation_rr: 1.0  # Activate at 1:1 RR
  
  # Partial profit taking
  partial_profit_enabled: true
  partial_profit_pct: 50  # Close 50% at 1:1 RR
  partial_profit_rr: 1.0
  
  # Position sizing method
  position_sizing_method: "risk_based"  # Options: fixed, risk_based, kelly, optimal_f
  kelly_fraction: 0.25  # Use 25% of Kelly Criterion
  
  # Correlation
  max_correlation_threshold: 0.7
  correlation_lookback_periods: 100

strategy:
  # Strategy selection
  primary_strategy: "trend_following"  # Options: trend_following, mean_reversion, breakout
  enable_regime_adaptation: true
  
  # Signal requirements
  min_confidence_score: 60  # Minimum 60% confidence
  min_indicators_aligned: 4  # Minimum 4/6 indicators must align
  require_mtf_alignment: true  # Require H4 and D1 trend agreement
  
  # Indicators
  indicators:
    ema_fast: 8
    ema_medium: 21
    ema_slow: 50
    ema_trend: 200
    rsi_period: 14
    rsi_oversold: 30
    rsi_overbought: 70
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    adx_period: 14
    adx_threshold: 25
    atr_period: 14
    bb_period: 20
    bb_std: 2.0
  
  # Entry filters
  filters:
    use_session_filter: true
    use_spread_filter: true
    use_news_filter: true
    use_volatility_filter: true
    use_correlation_filter: true

# News Filter Configuration
news_filter:
  enabled: true
  api_provider: 'alphavantage'  # Options: 'alphavantage', 'tradingeconomics'
  api_key: 'HVWKYP9NY6UW8A15'  # Alpha Vantage API key
  buffer_before_minutes: 30  # Don't trade 30min before news
  buffer_after_minutes: 30   # Don't trade 30min after news
  min_impact: 'MEDIUM'  # Filter news by impact: LOW, MEDIUM, HIGH
  cache_duration_hours: 1  # Cache news data for 1 hour
    
  # Volatility filters
  min_atr_ratio: 0.5  # Min ATR/AvgATR
  max_atr_ratio: 2.0  # Max ATR/AvgATR
  max_bb_width: 1.5

ml:
  # Machine learning settings
  enabled: true
  model_type: "xgboost"  # Options: xgboost, random_forest, neural_network
  model_path: "./data/models/xgboost_model.pkl"
  
  # Feature engineering
  lookback_periods: [5, 10, 20, 50, 100]
  use_technical_features: true
  use_time_features: true
  use_volatility_features: true
  use_correlation_features: true
  
  # Model training
  retrain_frequency: "weekly"
  min_training_samples: 1000
  train_test_split: 0.8
  cross_validation_folds: 5
  
  # Prediction
  use_ml_confidence: true
  ml_confidence_weight: 0.3  # 30% weight to ML confidence

monitoring:
  # Performance tracking
  track_metrics: true
  metrics_update_interval: 300  # Update every 5 minutes
  
  # Reporting
  daily_report: true
  weekly_report: true
  monthly_report: true
  
  # Alerts
  enable_alerts: true
  alert_on_trade: true
  alert_on_loss_limit: true
  alert_on_drawdown: true
  alert_on_error: true
  
  # Email alerts (configure separately)
  email_enabled: false
  email_recipient: "your_email@example.com"
  
  # Dashboard
  enable_dashboard: true
  dashboard_port: 8050

backtesting:
  # Backtest settings
  use_tick_data: false  # Use tick data if available
  include_spread: true
  include_commission: true
  include_slippage: true
  
  # Costs
  commission_per_lot: 7.0  # $7 per lot
  slippage_pips: 0.5
  
  # Walk-forward analysis
  optimization_window_months: 24
  test_window_months: 6
  
  # Validation
  min_backtest_trades: 100
  min_win_rate: 0.40
  min_profit_factor: 1.3
  max_drawdown: 0.25

logging:
  # Logging levels
  log_level: "INFO"  # Options: DEBUG, INFO, WARNING, ERROR, CRITICAL
  
  # Log files
  trade_log: "./data/logs/trades.log"
  error_log: "./data/logs/errors.log"
  performance_log: "./data/logs/performance.log"
  system_log: "./data/logs/system.log"
  
  # Log rotation
  max_log_size_mb: 50
  backup_count: 10
  
  # Console output
  console_output: true
  verbose_mode: false

database:
  # Database settings (optional)
  enabled: false
  type: "postgresql"  # Options: postgresql, sqlite
  host: "localhost"
  port: 5432
  database: "forex_trading"
  user: "trader"
  # password loaded from environment variable

redis:
  # Redis cache (optional)
  enabled: false
  host: "localhost"
  port: 6379
  db: 0
  
system:
  # System settings
  timezone: "GMT"
  check_interval: 60  # Check for new signals every 60 seconds
  heartbeat_interval: 300  # Send heartbeat every 5 minutes
  
  # Safety
  enable_safety_checks: true
  max_memory_usage_pct: 80
  max_cpu_usage_pct: 80
  
  # Auto shutdown
  auto_shutdown_on_error: false
  auto_restart_on_disconnect: true
