<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trading Bot v17</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1419;--card:#1c2128;--border:#30363d;--text:#e6edf3;--muted:#7d8590;--blue:#58a9f9;--green:#3fb950;--red:#f85149;--yellow:#d29922}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5}
.container{max-width:1600px;margin:0 auto;padding:16px}
.header{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:var(--card);border-radius:12px;margin-bottom:16px;border:1px solid var(--border)}
.header h1{color:var(--blue);font-size:22px;font-weight:700}
.header button{padding:8px 16px;background:#21262d;color:var(--text);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:14px}
.header button:hover{background:#30363d}
.status-row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:16px}
.status-item{background:var(--card);padding:14px 18px;border-radius:10px;border:1px solid var(--border);text-align:center}
.status-item .label{font-size:11px;text-transform:uppercase;color:var(--muted);letter-spacing:0.5px;margin-bottom:6px}
.status-item .value{font-size:20px;font-weight:700}
.status-item .value.green{color:var(--green)}
.status-item .value.red{color:var(--red)}
.status-item .value.blue{color:var(--blue)}
.main-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.card{background:var(--card);border-radius:12px;padding:16px;border:1px solid var(--border)}
.card-title{font-size:13px;font-weight:600;text-transform:uppercase;color:var(--muted);letter-spacing:0.5px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.card-title .badge{padding:3px 10px;background:#21262d;border-radius:12px;font-size:12px;color:var(--muted)}
.session-tags{display:flex;gap:8px;flex-wrap:wrap}
.session-tag{padding:8px 16px;background:#21262d;border-radius:8px;font-size:14px;color:var(--muted);border:1px solid var(--border)}
.session-tag.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.session-tag.good{background:rgba(63,185,80,0.2);color:var(--green);border-color:var(--green)}
.market-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.market-item{padding:12px 8px;background:#21262d;border-radius:8px;text-align:center}
.market-item .pair{font-weight:700;font-size:15px;display:block;margin-bottom:6px}
.market-item .tf-row{display:flex;justify-content:center;gap:6px}
.market-item .tf{font-size:10px;padding:2px 6px;border-radius:4px;border:1px solid var(--border)}
.market-item .tf.h4{border-color:#a371f7;color:#a371f7}
.market-item .tf.h1{border-color:#58a9f9;color:#58a9f9}
.market-item .tf.m30{border-color:#d29922;color:#d29922}
.market-item.bull{background:rgba(63,185,80,0.1)}
.market-item.bear{background:rgba(248,81,73,0.1)}
.market-item.bull .pair{color:var(--green)}
.market-item.bear .pair{color:var(--red)}
.selection-card{margin-bottom:12px}
.selection-card .card-title{margin-bottom:10px}
.selection-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.tag{padding:10px 18px;background:#21262d;border-radius:8px;cursor:pointer;font-size:14px;border:2px solid var(--border);transition:all 0.2s}
.tag:hover{background:#30363d;border-color:#484f58}
.tag.selected{border-color:var(--blue);background:rgba(88,166,249,0.15);color:var(--blue)}
.strat-tag{position:relative}
.strat-tag .tooltip{display:none;position:absolute;top:100%;left:0;background:#0f1419;border:1px solid var(--border);padding:8px;border-radius:6px;font-size:12px;z-index:10;min-width:200px;margin-top:4px}
.strat-tag:hover .tooltip{display:block}
.controls-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.btn{padding:12px 24px;border:none;border-radius:10px;cursor:pointer;font-size:15px;font-weight:600;transition:all 0.2s}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#79b8ff}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover{background:#56d364}
.btn-warning{background:var(--yellow);color:#000}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#ff6e6e}
.btn-scan{font-size:17px;padding:14px 32px}
.timer{font-size:14px;color:var(--muted);padding:10px 16px;background:#21262d;border-radius:8px;min-width:100px;text-align:center}
.signals-card .card-title{margin-bottom:14px}
.signals-list{display:flex;flex-direction:column;gap:10px;max-height:500px;overflow-y:auto}
.signal-card{background:#21262d;border-radius:10px;padding:16px;border-left:5px solid var(--border);display:flex;align-items:center;gap:16px;transition:all 0.2s}
.signal-card.buy{border-left-color:var(--green)}
.signal-card.sell{border-left-color:var(--red)}
.signal-card.expired{opacity:0.5;border-left-color:var(--muted)}
.signal-main{flex:1}
.signal-header{display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.signal-sym{font-weight:800;font-size:18px}
.signal-type{padding:4px 12px;border-radius:6px;font-size:13px;font-weight:600}
.signal-type.buy{background:rgba(63,185,80,0.2);color:var(--green)}
.signal-type.sell{background:rgba(248,81,73,0.2);color:var(--red)}
.signal-strat{font-size:13px;color:var(--muted);background:#1c2128;padding:4px 10px;border-radius:4px}
.signal-details{display:flex;gap:20px;font-size:15px;color:var(--muted);flex-wrap:wrap}
.signal-details span{white-space:nowrap}
.signal-details b{color:var(--text)}
.signal-details .green{color:var(--green)}
.signal-details .red{color:var(--red)}
.signal-meta{min-width:120px;text-align:right}
.signal-time{font-size:13px;color:var(--muted);margin-bottom:6px}
.signal-risk{font-size:14px;padding:6px 12px;background:#161b22;border-radius:6px;display:inline-block}
.signal-risk.warning{background:rgba(210,153,34,0.2);color:var(--yellow)}
.signal-actions{min-width:100px}
.signal-enter{padding:10px 20px;background:var(--green);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:15px;font-weight:600;width:100%}
.signal-enter:hover{background:#56d364}
.signal-enter:disabled{background:#30363d;color:var(--muted);cursor:not-allowed}
.no-data{padding:40px;text-align:center;color:var(--muted);font-size:16px;background:#21262d;border-radius:10px}
.pos-table{width:100%;border-collapse:collapse}
.pos-table th,.pos-table td{padding:12px 16px;text-align:left;border-bottom:1px solid var(--border);font-size:15px}
.pos-table th{font-size:12px;text-transform:uppercase;color:var(--muted);background:#161b22}
.pos-table .buy{color:var(--green);font-weight:600}
.pos-table .sell{color:var(--red);font-weight:600}
.close-btn{padding:6px 12px;background:var(--red);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px}
.history-section .card-title{margin-bottom:12px}
.filter-row{display:flex;gap:8px;margin-bottom:14px}
.filter-btn{padding:8px 16px;background:#21262d;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:14px;color:var(--muted)}
.filter-btn:hover{background:#30363d}
.filter-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.history-list{max-height:350px;overflow-y:auto}
.history-item{display:flex;justify-content:space-between;padding:12px 16px;background:#21262d;margin:6px 0;border-radius:8px;font-size:15px}
.history-item span:first-child{font-weight:600}
.pagination{display:flex;gap:10px;align-items:center;margin-top:14px}
.pagination button{background:#21262d;color:var(--text);border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:14px}
.pagination button:disabled{opacity:0.4;cursor:not-allowed}
.page-info{color:var(--muted);font-size:14px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:var(--card);border-radius:16px;padding:28px;min-width:450px;max-width:90vw;border:1px solid var(--border);box-shadow:0 25px 80px rgba(0,0,0,0.6)}
.modal-title{font-size:22px;font-weight:700;margin-bottom:20px}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.modal-item{background:#21262d;padding:16px;border-radius:10px}
.modal-item .label{font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase}
.modal-item .value{font-size:20px;font-weight:700}
.modal-item .value.green{color:var(--green)}
.modal-item .value.red{color:var(--red)}
.modal-warning{background:rgba(210,153,34,0.2);color:var(--yellow);padding:14px;border-radius:10px;margin-bottom:20px;font-size:15px}
.modal-actions{display:flex;gap:12px;justify-content:flex-end}
.modal-actions .btn{padding:12px 28px;font-size:16px}
.footer{text-align:center;padding:24px;color:var(--muted);font-size:13px}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>Trading Bot <span style="font-size:14px;color:var(--muted);font-weight:400">v17</span></h1>
<button onclick="location.reload()">Reload</button>
</div>

<div id="loading" style="text-align:center;padding:80px;color:var(--blue);font-size:22px">Loading...</div>

<div id="dashboard" class="hidden">
<div class="status-row" id="statusRow"></div>

<div class="main-row">
<div class="card">
<div class="card-title">Sessions (UTC)</div>
<div class="session-tags" id="sessionTags"></div>
</div>
<div class="card">
<div class="card-title">Market Direction <span style="font-size:10px;color:var(--muted)">(H4/H1/M30)</span></div>
<div class="market-grid" id="marketGrid"></div>
</div>
</div>

<div class="card selection-card">
<div class="card-title">Pairs <span class="badge" id="pairCount">7</span></div>
<div class="selection-row" id="pairTags"></div>
</div>

<div class="card selection-card">
<div class="card-title">Strategies <span class="badge" id="stratCount">0</span></div>
<div class="selection-row" id="stratTags"></div>
</div>

<div class="controls-row">
<button class="btn btn-primary btn-scan" id="btnScan" onclick="doScan()">SCAN</button>
<span class="timer" id="scanTimer">Next H4: --:--</span>
<button class="btn btn-success" id="btnAuto" onclick="toggleAuto()"><span id="autoIcon">&#9654;</span> <span id="autoText">AUTO</span></button>
<button class="btn btn-warning" onclick="confirmAction('close-profitable','Close all profitable positions?')">CLOSE +P&amp;L</button>
<button class="btn btn-danger" onclick="confirmAction('close-all','Close ALL positions?')">CLOSE ALL</button>
</div>

<div class="card signals-card">
<div class="card-title">Signals <span class="badge" id="signalCount">0</span></div>
<div class="signals-list" id="signalsList"></div>
</div>

<div class="card">
<div class="card-title">Open Positions <span class="badge" id="posCount">0</span></div>
<div id="positionsList"></div>
</div>

<div class="card history-section">
<div class="card-title">Trade History</div>
<div class="filter-row">
<button class="filter-btn active" onclick="setFilter(0,this)">Today</button>
<button class="filter-btn" onclick="setFilter(1,this)">1 Hour</button>
<button class="filter-btn" onclick="setFilter(4,this)">4 Hours</button>
<button class="filter-btn" onclick="setFilter(168,this)">Week</button>
</div>
<div class="history-list" id="historyList"></div>
<div class="pagination" id="pagination"></div>
</div>

<div class="footer">Trading Bot v21 | Multi-Strategy | Max 2 positions | 1% risk per trade</div>
</div>
</div>

<div id="tradeModal" class="hidden">
<div class="modal-overlay" onclick="closeModal()">
<div class="modal" onclick="event.stopPropagation()">
<div class="modal-title" id="modalTitle">Confirm Trade</div>
<div class="modal-warning hidden" id="modalWarning"></div>
<div class="modal-grid" id="modalGrid"></div>
<div class="modal-actions">
<button class="btn btn-danger" onclick="closeModal()">Cancel</button>
<button class="btn btn-success" id="btnConfirm" onclick="confirmTrade()">Enter Trade</button>
</div>
</div>
</div>
</div>

<div id="actionModal" class="hidden">
<div class="modal-overlay" onclick="closeActionModal()">
<div class="modal" onclick="event.stopPropagation()">
<div class="modal-title" id="actionTitle">Confirm</div>
<div id="actionMessage" style="margin:20px 0;font-size:17px"></div>
<div class="modal-actions">
<button class="btn btn-danger" onclick="closeActionModal()">Cancel</button>
<button class="btn btn-success" onclick="executeAction()">Confirm</button>
</div>
</div>
</div>
</div>

<script>
const $=id=>document.getElementById(id);
const ALL_PAIRS=['XAUUSD','EURUSD','GBPUSD','USDJPY','AUDUSD','USDCAD','NZDUSD'];
const TF_LABELS={'Swing_H4H1':'H4+H1','Trend_Rider':'H4','Breakout_Hunter':'H4','Smart_Money':'H4+H1','Mean_Reversion':'H1+M15'};
var selectedPairs=[],allStrategies={},activeStratKeys=[],filterHours=0,currentPage=1,totalPages=1;
var allSignals=[],allHistory=[],itemsPerPage=8,autoRunning=false,pendingAction=null,currentSignalIdx=-1;
var signalExpiryTime=null,serverExpirySeconds=0;

function api(url,method='GET',body=null){
    return fetch(url+(url.includes('?')?'&':'?')+'_='+Date.now(),{
        method:method,
        headers:body?{'Content-Type':'application/json'}:{},
        body:body?JSON.stringify(body):null
    }).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json()})
    .catch(e=>{console.error('API Error:',e);return null})}

function fmt(v,d=2){v=parseFloat(v);return isNaN(v)?'0':v.toFixed(d);}

function togglePair(p){
    var i=selectedPairs.indexOf(p);
    if(i>=0)selectedPairs.splice(i,1);else selectedPairs.push(p);
    renderPairs();
    api('/api/pairs?pairs='+selectedPairs.join(','),'POST');
    filterSignalsByPairs();}

function renderPairs(){
    var html='';
    ALL_PAIRS.forEach(p=>{
        var sel=selectedPairs.indexOf(p)>=0;
        html+='<div class="tag'+(sel?' selected':'')+'" onclick="togglePair(\''+p+'\')">'+p+'</div>'});
    $('pairTags').innerHTML=html;
    $('pairCount').textContent=selectedPairs.length+' selected';}

function toggleStrat(k){
    var i=activeStratKeys.indexOf(k);
    if(i>=0)activeStratKeys.splice(i,1);else activeStratKeys.push(k);
    renderStrats();
    api('/api/strategies?strategies='+activeStratKeys.join(','),'POST');}

function renderStrats(){
    var html='';
    Object.keys(allStrategies).forEach(k=>{
        var strat=allStrategies[k];
        var isActive=activeStratKeys.indexOf(k)>=0;
        html+='<div class="tag strat-tag'+(isActive?' selected':'')+'" onclick="toggleStrat(\''+k+'\')">'+strat.name+
            '<div class="tooltip"><b>Timeframes:</b> '+(strat.timeframes||[]).join(', ')+'<br><b>Indicators:</b> '+(strat.indicators||[]).join(', ')+'<br><b>Best for:</b> '+strat.best_for+'</div>'+
            '</div>';
    });
    $('stratTags').innerHTML=html;
    $('stratCount').textContent=activeStratKeys.length+' active';}

function filterSignalsByPairs(){
    if(allSignals.length===0)return;
    renderSignals();}

function refresh(){
    api('/api/status?hours='+filterHours).then(data=>{
        if(!data)return;
        $('loading').classList.add('hidden');
        $('dashboard').classList.remove('hidden');
        
        autoRunning=data.running||false;
        serverExpirySeconds=data.signal_expiry_seconds||3600;
        var btn=$('btnAuto');
        btn.innerHTML='<span id="autoIcon">'+(autoRunning?'&#10074;&#10074;':'&#9654;')+'</span> <span id="autoText">'+(autoRunning?'PAUSE':'AUTO')+'</span>';
        btn.className='btn '+(autoRunning?'btn-danger':'btn-success');
        
        var s=data.session||{},sessCode=s.code||'OFF';
        var sessions=['SYDNEY','TOKYO','LONDON','NEW_YORK','OVERLAP','OFF_HOURS'];
        var sessHtml='';
        sessions.forEach(sn=>{
            var cls='session-tag';
            if(sn===sessCode){
                cls+=' active';
                if(['LONDON','NEW_YORK','OVERLAP','SILVER_BULLET'].indexOf(sn)>=0)cls+=' good';
            }
            sessHtml+='<div class="'+cls+'">'+sn.replace('_',' ')+'</div>'});
        $('sessionTags').innerHTML=sessHtml;
        
        var dirs=data.market_directions||{},mktHtml='';
        Object.keys(dirs).forEach(sym=>{
            var d=dirs[sym]||{};
            var h4=d.H4||{},h1=d.H1||{},m30=d.M30||{};
            var mainTrend=h4.trend||'NEUT';
            var cls='market-item';
            if(mainTrend==='BULLISH')cls+=' bull';else if(mainTrend==='BEARISH')cls+=' bear';
            mktHtml+='<div class="'+cls+'"><span class="pair">'+sym+'</span><div class="tf-row">'+
                '<span class="tf h4" style="color:'+(h4.trend==='BULLISH'?'var(--green)':h4.trend==='BEARISH'?'var(--red)':'var(--muted)')+'">H4:'+(h4.trend||'N').substring(0,1)+'</span>'+
                '<span class="tf h1" style="color:'+(h1.trend==='BULLISH'?'var(--green)':h1.trend==='BEARISH'?'var(--red)':'var(--muted)')+'">H1:'+(h1.trend||'N').substring(0,1)+'</span>'+
                '<span class="tf m30" style="color:'+(m30.trend==='BULLISH'?'var(--green)':m30.trend==='BEARISH'?'var(--red)':'var(--muted)')+'">M30:'+(m30.trend||'N').substring(0,1)+'</span>'+
                '</div></div>';
        });
        $('marketGrid').innerHTML=mktHtml||'<div class="no-data">No data</div>';
        
        if(selectedPairs.length===0)selectedPairs=[...ALL_PAIRS];
        if(Object.keys(allStrategies).length===0&&data.available_strategies){
            allStrategies=data.available_strategies;
            activeStratKeys=data.active_strategies||Object.keys(allStrategies);
        }
        renderPairs();
        renderStrats();
        
        var stHtml='<div class="status-item"><div class="label">Balance</div><div class="value">$'+fmt(data.balance)+'</div></div>'+
            '<div class="status-item"><div class="label">Equity</div><div class="value">$'+fmt(data.equity)+'</div></div>'+
            '<div class="status-item"><div class="label">Floating</div><div class="value '+(data.profit>=0?'green':'red')+'">'+(data.profit>=0?'+':'')+'$'+fmt(data.profit)+'</div></div>'+
            '<div class="status-item"><div class="label">Positions</div><div class="value blue">'+data.positions+'/2</div></div>'+
            '<div class="status-item"><div class="label">Margin</div><div class="value">$'+fmt(data.margin_free)+'</div></div>'+
            '<div class="status-item"><div class="label">Session</div><div class="value blue">'+sessCode.replace('_',' ')+'</div></div>';
        $('statusRow').innerHTML=stHtml;
        
        var rawSignals=data.scan_results||[];
        allSignals=rawSignals.map((s,i)=>{s._idx=i;return s;});
        filterSignalsByPairs();
        
        var pos=data.open_positions||[];
        $('posCount').textContent=pos.length;
        if(pos.length===0)$('positionsList').innerHTML='<div class="no-data">No open positions</div>';
        else{
            var posHtml='<table class="pos-table"><thead><tr><th>Symbol</th><th>Type</th><th>Entry</th><th>Current</th><th>P&L</th><th></th></tr></thead><tbody>';
            pos.forEach(p=>{
                var cls=p.type.toLowerCase(),prof=parseFloat(p.profit);
                posHtml+='<tr><td>'+p.symbol+'</td><td class="'+cls+'">'+p.type+'</td><td>'+fmt(p.entry,5)+'</td><td>'+fmt(p.current,5)+'</td><td class="'+(prof>=0?'green':'red')+'">'+(prof>=0?'+':'')+'$'+fmt(prof)+'</td><td><button class="close-btn" onclick="closePos('+p.ticket+')">X</button></td></tr>'});
            $('positionsList').innerHTML=posHtml+'</tbody></table>';}
        
        allHistory=data.trade_history||[];
        renderHistory();
        updateSignalTimers();});}

function renderSignals(){
    $('signalCount').textContent=allSignals.length;
    if(allSignals.length===0){
        $('signalsList').innerHTML='<div class="no-data">No signals. Select pairs & strategies, then SCAN.</div>';
        return;}
    var html='';
    allSignals.forEach((s)=>{
        var dir=s.direction.toLowerCase(),tf=TF_LABELS[s.strategy]||'H4';
        var expired=signalExpiryTime&&Date.now()>signalExpiryTime;
        var warning=s.trade_reason&&s.trade_reason!=='OK';
        var cardClass='signal-card '+dir+(expired?' expired':'');
        var stratName=allStrategies[s.strategy]?.name||s.strategy||'?';
        var idx=s._idx>=0?s._idx:s.symbol+s.direction;
        html+='<div class="'+cardClass+'">'+
            '<div class="signal-main">'+
                '<div class="signal-header">'+
                    '<span class="signal-sym">'+s.symbol+'</span>'+
                    '<span class="signal-type '+dir+'">'+s.direction+'</span>'+
                    '<span class="signal-strat">'+stratName+'</span>'+
                '</div>'+
                '<div class="signal-details">'+
                    '<span>E: <b>'+fmt(s.entry,5)+'</b></span>'+
                    '<span>SL: <b class="red">'+fmt(s.sl,5)+'</b></span>'+
                    '<span>TP: <b class="green">'+fmt(s.tp,5)+'</b></span>'+
                    '<span>R:R <b>1:'+(s.rr_ratio||0)+'</b></span>'+
                '</div>'+
            '</div>'+
            '<div class="signal-meta">'+
                '<div class="signal-time" id="timer-'+idx+'">--:--</div>'+
                '<div class="signal-risk'+(warning?' warning':'')+'">Risk: $'+fmt(s.risk_amount)+'</div>'+
            '</div>'+
            '<div class="signal-actions">'+
                '<button class="signal-enter" onclick="showTrade('+s._idx+')" '+(expired?'disabled':'')+'>'+(expired?'Expired':(s.can_trade?'Enter':'Blocked'))+'</button>'+
            '</div>'+
        '</div>';});
    $('signalsList').innerHTML=html;}

function updateSignalTimers(){
    if(!signalExpiryTime||serverExpirySeconds<=0){
        $('scanTimer').textContent='Next H4: --:--';
        return;}
    var remaining=Math.max(0,Math.floor((signalExpiryTime-Date.now())/1000));
    var mins=Math.floor(remaining/60),secs=remaining%60;
    $('scanTimer').textContent='Next H4: '+mins+':'+(secs<10?'0':'')+secs;
    allSignals.forEach((s)=>{
        var idx=s._idx>=0?s._idx:s.symbol+s.direction;
        var el=$('timer-'+idx);
        if(el)el.textContent=mins+':'+(secs<10?'0':'')+secs;});}

function renderHistory(){
    var filtered=allHistory;
    if(filterHours>0){
        var now=new Date();
        filtered=allHistory.filter(h=>{return(now-new Date(h.time))<filterHours*3600000;});}
    totalPages=Math.ceil(filtered.length/itemsPerPage)||1;
    currentPage=Math.min(currentPage,totalPages);
    var start=(currentPage-1)*itemsPerPage;
    var pageItems=filtered.slice(start,start+itemsPerPage);
    if(pageItems.length===0){
        $('historyList').innerHTML='<div class="no-data">No trade history</div>';
        $('pagination').innerHTML='';
        return;}
    var html='';
    pageItems.forEach(h=>{
        var prof=parseFloat(h.profit);
        html+='<div class="history-item"><span>'+h.symbol+' '+h.type+'</span><span>'+new Date(h.time).toLocaleString()+'</span><span class="'+(prof>=0?'green':'red')+'">'+(prof>=0?'+':'')+'$'+fmt(prof)+'</span></div>';});
    $('historyList').innerHTML=html;
    var pgHtml='<button onclick="changePage(-1)" '+(currentPage<=1?'disabled':'')+'>Prev</button>'+
        '<span class="page-info">Page '+currentPage+' of '+totalPages+'</span>'+
        '<button onclick="changePage(1)" '+(currentPage>=totalPages?'disabled':'')+'>Next</button>';
    $('pagination').innerHTML=pgHtml;}

function changePage(d){currentPage=Math.max(1,Math.min(totalPages,currentPage+d));renderHistory();}

function setFilter(h,btn){
    filterHours=h;currentPage=1;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    if(btn)btn.classList.add('active');
    refresh();}

function doScan(){
    if(activeStratKeys.length===0){alert('Please select at least one strategy');return;}
    var pairs=selectedPairs.length>0?selectedPairs.join(','):ALL_PAIRS.join(',');
    var btn=$('btnScan');
    btn.disabled=true;btn.textContent='Scanning...';
    api('/api/scan?pairs='+pairs,'POST').then(r=>{
        btn.disabled=false;btn.textContent='SCAN';
        signalExpiryTime=Date.now()+(serverExpirySeconds*1000);
        refresh();
        if(autoRunning)startAutoExpiryTimer();
    });}

function startAutoExpiryTimer(){
    if(!autoRunning)return;
    var interval=setInterval(()=>{
        if(!autoRunning){clearInterval(interval);return;}
        if(signalExpiryTime&&Date.now()>signalExpiryTime){
            clearInterval(interval);
            doScan();
        }
    },10000);}

function toggleAuto(){
    if(autoRunning){
        api('/api/stop','POST').then(r=>{autoRunning=false;refresh();});
    }else{
        api('/api/start','POST').then(r=>{
            autoRunning=true;
            signalExpiryTime=Date.now()+(serverExpirySeconds*1000);
            startAutoExpiryTimer();
            refresh();
        });}}

function showTrade(idx){
    currentSignalIdx=idx;
    var s=allSignals[idx];
    if(!s)return;
    var tf=TF_LABELS[s.strategy]||'H4';
    var stratName=allStrategies[s.strategy]?.name||s.strategy||'?';
    $('modalTitle').textContent=s.symbol+' '+s.direction+' ['+stratName+']';
    var warn=$('modalWarning');
    if(s.trade_reason&&s.trade_reason!=='OK'){
        warn.classList.remove('hidden');
        warn.textContent='Warning: '+s.trade_reason;}
    else warn.classList.add('hidden');
    var grid=$('modalGrid');
    grid.innerHTML=
        '<div class="modal-item"><div class="label">Entry</div><div class="value">'+fmt(s.entry,5)+'</div></div>'+
        '<div class="modal-item"><div class="label">Timeframe</div><div class="value">'+tf+'</div></div>'+
        '<div class="modal-item"><div class="label">Stop Loss</div><div class="value red">'+fmt(s.sl,5)+'</div></div>'+
        '<div class="modal-item"><div class="label">Risk</div><div class="value">$'+fmt(s.risk_amount)+'</div></div>'+
        '<div class="modal-item"><div class="label">Take Profit</div><div class="value green">'+fmt(s.tp,5)+'</div></div>'+
        '<div class="modal-item"><div class="label">Lot Size</div><div class="value">'+s.lot+'</div></div>'+
        '<div class="modal-item"><div class="label">R:R Ratio</div><div class="value">1:'+(s.rr_ratio||0)+'</div></div>'+
        '<div class="modal-item"><div class="label">Spread</div><div class="value">'+s.spread+' pips</div></div>';
    $('btnConfirm').textContent=s.can_trade?'Enter Trade':'Enter Anyway';
    $('tradeModal').classList.remove('hidden');}

function closeModal(){$('tradeModal').classList.add('hidden');currentSignalIdx=-1;}

function confirmTrade(){
    if(currentSignalIdx<0)return;
    var s=allSignals[currentSignalIdx];
    if(!s){alert('Signal not found');return;}
    var url=s.can_trade?'/api/execute/'+currentSignalIdx:'/api/execute-override/'+currentSignalIdx;
    closeModal();
    api(url,'POST').then(d=>{
        console.log('Trade response:',d);
        if(d&&d.ok){
            allSignals.splice(currentSignalIdx,1);
            renderSignals();
            alert('Trade executed successfully!');}
        else alert('Trade failed: '+(d?.message||'Unknown error'));
        refresh();});}

function confirmAction(a,m){
    pendingAction=a;
    $('actionTitle').textContent='Confirm';
    $('actionMessage').textContent=m;
    $('actionModal').classList.remove('hidden');}

function closeActionModal(){$('actionModal').classList.add('hidden');pendingAction=null;}

function executeAction(){
    var action=pendingAction;
    closeActionModal();
    if(!action)return;
    if(action==='close-profitable')api('/api/close-profitable','POST').then(()=>refresh());
    else if(action==='close-all')api('/api/close-all','POST').then(()=>refresh());
    else if(action.startsWith('close-pos-'))api('/api/close/'+action.replace('close-pos-',''),'POST').then(()=>refresh());}

function closePos(t){confirmAction('close-pos-'+t,'Close position #'+t+'?');}

refresh();
setInterval(refresh,30000);
setInterval(updateSignalTimers,1000);
</script>
</body>
</html>
